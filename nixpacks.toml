[phases.setup]
nixPkgs = ["rustc", "cargo", "nodejs_20", "npm"]

[phases.build]
cmds = [
  "npm ci --prefix frontend",
  "npm run build --prefix frontend",
  "cargo build --release"
]

[start]
cmd = "sh -c 'LEECH__SERVER__HOST=0.0.0.0 LEECH__SERVER__PORT=${PORT:-8000} LEECH_DATA_DIR=${LEECH_DATA_DIR:-/data/usage} ./target/release/leech-rs'"
